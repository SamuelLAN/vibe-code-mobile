name: plutux_code
description: Plutux-code - AI coding workspace
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1
  flutter_markdown: ^0.7.3+1
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  http: ^1.2.2
  url_launcher: ^6.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.svg

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true
